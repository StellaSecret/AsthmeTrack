version: 2
updates:
  # Root package.json — Capacitor core + CLI + Playwright
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    labels: [dependencies]
    commit-message:
      prefix: "chore(deps)"

  # Android Gradle dependencies
  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    labels: [dependencies, android]
    commit-message:
      prefix: "chore(deps/android)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(deps/actions)"
