name: CI/CD AsthmeTrack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PARALLEL SECURITY JOBS ────────────────────────────
  scan-secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3

  npm-security:
    name: NPM Audit & Placeholders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install & Audit
        run: |
          npm ci
          npm audit --audit-level=high
      - name: Verify Placeholders
        run: |
          if grep -q "apps.googleusercontent.com" www/index.html || grep -q "apps.googleusercontent.com" capacitor.config.json; then
            echo "❌ Google Client ID en clair !" && exit 1
          fi

  # ── PARALLEL TEST JOB (Sharded) ──────────────────────
  playwright-tests:
    name: Playwright Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - name: Upload report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 30

  # ── SEQUENTIAL DEPLOYMENT JOBS ───────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Inject Client ID
        run: |
          sed -i "s|__GOOGLE_CLIENT_ID__|${{ secrets.GOOGLE_CLIENT_ID }}|g" www/app/app.js
          sed -i "s|__GOOGLE_CLIENT_ID__|${{ secrets.GOOGLE_CLIENT_ID }}|g" capacitor.config.json
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./www
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  build-android:
    name: Build Android
    if: github.ref == 'refs/heads/main'
    needs: [scan-secrets, codeql-analysis, npm-security, playwright-tests]
    runs-on: ubuntu-latest
    outputs:
      artifact-name: artifacts-${{ github.run_number }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install & Sync
        run: |
          npm ci
          sed -i "s|__GOOGLE_CLIENT_ID__|${{ secrets.GOOGLE_CLIENT_ID }}|g" www/app/app.js
          sed -i "s|__GOOGLE_CLIENT_ID__|${{ secrets.GOOGLE_CLIENT_ID }}|g" capacitor.config.json
          npx cap sync android
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/asthmetrack-release.jks
      - name: Build Bundle & APK
        run: |
          cd android
          chmod +x gradlew
          VCODE=$((28 + ${{ github.run_number }}))
          sed -i "s/versionCode .*/versionCode $VCODE/" app/build.gradle
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/asthmetrack-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" --no-daemon
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ github.run_number }}
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

  release:
    name: Create Release
    if: github.ref == 'refs/heads/main'
    needs: build-android
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: artifacts-${{ github.run_number }}
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "AsthmeTrack v1.0.${{ github.run_number }}"
          files: dist/**/app-release.*
