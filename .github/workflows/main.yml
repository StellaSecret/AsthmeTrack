name: CI/CD AsthmeTrack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  actions: read
  pages: write

jobs:
  # ── JOB 1 : SÉCURITÉ ──────────────────────────────────
  security-checks:
    name: Security & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
      - name: NPM Audit
        run: |
          npm ci
          npm audit --audit-level=high
      - name: Verify Placeholders
        run: |
          if grep -q "apps.googleusercontent.com" www/index.html || grep -q "apps.googleusercontent.com" capacitor.config.json; then
            echo "❌ Google Client ID en clair !" && exit 1
          fi

  # ── JOB 2 : TESTS ─────────────────────────────────────
  playwright-tests:
    name: Playwright Tests
    needs: [security-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run tests
        run: npm test
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ── JOB 3 : BUILD ANDROID ─────────────────────────────
  build-android:
    name: Build Android
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    outputs:
      artifact-name: artifacts-${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install & Sync
        run: |
          npm ci
          sed -i "s|__GOOGLE_CLIENT_ID__|${{ secrets.GOOGLE_CLIENT_ID }}|g" www/index.html
          sed -i "s|__GOOGLE_CLIENT_ID__|${{ secrets.GOOGLE_CLIENT_ID }}|g" capacitor.config.json
          npx cap sync android
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/asthmetrack-release.jks
      - name: Build Bundle & APK
        run: |
          cd android
          chmod +x gradlew
          VCODE=$((28 + ${{ github.run_number }}))
          sed -i "s/versionCode .*/versionCode $VCODE/" app/build.gradle
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/asthmetrack-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" --no-daemon
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ github.run_number }}
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

  # ── JOB 4 : DÉPLOIEMENT PAGES ────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  # ── JOB 5 : RELEASE (Gate) ────────────────────────────
  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: artifacts-${{ github.run_number }}
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "AsthmeTrack v1.0.${{ github.run_number }}"
          files: dist/**/app-release.*
