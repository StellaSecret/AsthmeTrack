<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AsthmeTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e222d;
    --border: #2a2f3d;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #4f9cf9;
    --accent2: #7c3aed;
    --green: #10d9a0;
    --yellow: #f5a623;
    --red: #f04f4f;
    --green-dim: rgba(16,217,160,0.12);
    --yellow-dim: rgba(245,166,35,0.12);
    --red-dim: rgba(240,79,79,0.12);
    --radius: 14px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 14px; min-height: 100vh; overflow-x: hidden; }

  .app-header { position: sticky; top: 0; z-index: 100; background: rgba(13,15,20,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
  .app-header h1 { font-family: var(--font-head); font-size: 20px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.syncing { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(13,15,20,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 0); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 4px; background: none; border: none; color: var(--muted); cursor: pointer; transition: color .2s; font-family: var(--font-mono); font-size: 10px; }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.5; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active svg { filter: drop-shadow(0 0 4px var(--accent)); }

  .page { display: none; padding: 20px 16px 100px; animation: fadeIn .25s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
  .card-title { font-family: var(--font-head); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }

  .zone-green { color: var(--green); background: var(--green-dim); }
  .zone-yellow { color: var(--yellow); background: var(--yellow-dim); }
  .zone-red { color: var(--red); background: var(--red-dim); }
  .zone-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }

  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .metric-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; position: relative; overflow: hidden; }
  .metric-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .metric-box.green::before { background: var(--green); }
  .metric-box.yellow::before { background: var(--yellow); }
  .metric-box.red::before { background: var(--red); }
  .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .metric-value { font-family: var(--font-head); font-size: 28px; font-weight: 800; line-height: 1; }
  .metric-unit { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .metric-pct { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .dep-measurements { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .chart-wrap { position: relative; height: 120px; margin-top: 8px; }
  canvas { width: 100% !important; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 15px; padding: 12px 14px; outline: none; transition: border-color .2s; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; }

  .dep-inputs { display: flex; gap: 8px; }
  .dep-field { flex: 1; }
  .dep-field label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 4px; text-align: center; }
  .dep-field input { width: 100%; text-align: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-head); font-size: 18px; font-weight: 700; padding: 12px 6px; outline: none; transition: border-color .2s; }
  .dep-field input:focus { border-color: var(--accent); }
  .dep-avg-display { background: rgba(79,156,249,.08); border: 1px solid rgba(79,156,249,.3); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .dep-avg-label { font-size: 11px; color: var(--muted); }
  .dep-avg-value { font-family: var(--font-head); font-size: 20px; font-weight: 800; color: var(--accent); }

  .easyhaler-btns { display: flex; gap: 6px; }
  .easyh-btn { flex: 1; padding: 14px 4px; background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; color: var(--muted); font-family: var(--font-head); font-size: 18px; font-weight: 700; cursor: pointer; transition: all .15s; text-align: center; }
  .easyh-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(79,156,249,.12); box-shadow: 0 0 12px rgba(79,156,249,.2); }

  .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #fff; font-family: var(--font-head); font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: .5px; transition: opacity .2s, transform .1s; }
  .btn-primary:active { opacity: .85; transform: scale(.98); }
  .btn-secondary { padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 13px; cursor: pointer; transition: border-color .2s; }
  .btn-secondary:hover { border-color: var(--accent); }

  /* Google Sign-In button — style officiel Google */
  .btn-google {
    width: 100%; padding: 14px 20px;
    background: #fff; border: 1px solid #dadce0;
    border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    font-family: 'Roboto', var(--font-mono); font-size: 15px; font-weight: 500;
    color: #3c4043; transition: background .15s, box-shadow .15s;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  .btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
  .btn-google:active { background: #f1f3f4; }
  .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

  .history-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .history-date { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .history-vals { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .history-chip { font-size: 12px; padding: 3px 9px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); }
  .history-comment { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-action-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px; transition: color .2s; }
  .icon-action-btn.edit:hover { color: var(--accent); }
  .icon-action-btn.del:hover { color: var(--red); }

  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 13px; color: var(--text); }
  .setting-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .toggle { position: relative; width: 46px; height: 26px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 26px; cursor: pointer; transition: background .2s; }
  .toggle-slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform .2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  .reminder-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; gap: 10px; }
  .reminder-info { flex: 1; }
  .reminder-time { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--accent); }
  .reminder-label-text { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .reminder-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  .add-reminder-form { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .add-reminder-form input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 10px 12px; outline: none; transition: border-color .2s; }
  .add-reminder-form input:focus { border-color: var(--accent); }
  .add-reminder-form input[type=time] { width: 110px; }
  .add-reminder-form input[type=text] { flex: 1; min-width: 120px; }

  /* Drive card */
  .drive-connected { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1px solid rgba(16,217,160,.3); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .drive-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green-dim); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .drive-info { flex: 1; }
  .drive-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .drive-sub { font-size: 11px; color: var(--green); margin-top: 2px; }
  .drive-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .drive-btn { flex: 1; padding: 11px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 12px; cursor: pointer; transition: all .2s; text-align: center; }
  .drive-btn:hover { border-color: var(--accent); color: var(--accent); }
  .drive-btn.upload { border-color: rgba(79,156,249,.4); color: var(--accent); background: rgba(79,156,249,.08); }
  .drive-btn.download { border-color: rgba(16,217,160,.4); color: var(--green); background: rgba(16,217,160,.08); }
  .drive-btn.danger { color: var(--red); }
  .drive-btn.danger:hover { border-color: var(--red); }

  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; transform: translateY(40px); transition: transform .25s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 20px; border-radius: 30px; font-family: var(--font-head); font-size: 13px; font-weight: 700; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--red); color: #fff; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color .2s; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn svg { width: 16px; height: 16px; }

  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .3; }
  .empty-state p { font-size: 13px; }

  .reminder-badge { font-size: 11px; padding: 4px 10px; background: rgba(79,156,249,.1); border: 1px solid rgba(79,156,249,.3); border-radius: 20px; color: var(--accent); margin-right: 6px; margin-bottom: 6px; display: inline-block; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<header class="app-header">
  <h1>AsthmeTrack</h1>
  <div class="header-right">
    <div id="syncIndicator" style="font-size:11px;color:var(--muted);display:none">↕ Drive</div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active"><div id="dashboardContent"></div></div>

<!-- SAISIE -->
<div id="page-saisie" class="page">
  <div class="card">
    <div class="card-title">Nouvelle mesure</div>
    <div class="field">
      <label>Date &amp; heure</label>
      <input type="datetime-local" id="inputDatetime"/>
    </div>
    <div class="field">
      <label>DEP — Moyenne sur 3 souffles (L/min)</label>
      <div class="dep-inputs">
        <div class="dep-field"><label>Souffle 1</label><input type="number" id="dep1" placeholder="—" min="50" max="900" oninput="updateDepAvg()"/></div>
        <div class="dep-field"><label>Souffle 2</label><input type="number" id="dep2" placeholder="—" min="50" max="900" oninput="updateDepAvg()"/></div>
        <div class="dep-field"><label>Souffle 3</label><input type="number" id="dep3" placeholder="—" min="50" max="900" oninput="updateDepAvg()"/></div>
      </div>
      <div class="dep-avg-display" id="depAvgDisplay" style="display:none">
        <span class="dep-avg-label">Moyenne calculée</span>
        <span class="dep-avg-value" id="depAvgValue">—</span>
      </div>
    </div>
    <div class="field">
      <label>SpO₂ — Oxymétrie de pouls (%)</label>
      <input type="number" id="inputSpO2" placeholder="ex. 97" min="70" max="100"/>
    </div>
    <div class="field">
      <label>Prises Easyhaler aujourd'hui</label>
      <div class="easyhaler-btns">
        <button class="easyh-btn" data-val="0" onclick="selectEasy(0)">0</button>
        <button class="easyh-btn" data-val="1" onclick="selectEasy(1)">1</button>
        <button class="easyh-btn" data-val="2" onclick="selectEasy(2)">2</button>
        <button class="easyh-btn" data-val="3" onclick="selectEasy(3)">3</button>
        <button class="easyh-btn" data-val="4" onclick="selectEasy(4)">4</button>
        <button class="easyh-btn" data-val="5" onclick="selectEasy(5)">5</button>
      </div>
    </div>
    <div class="field">
      <label>Commentaire (facultatif)</label>
      <textarea id="inputComment" placeholder="Symptômes, contexte, météo…"></textarea>
    </div>
    <button class="btn-primary" onclick="saveMeasure()">Enregistrer la mesure</button>
  </div>
</div>

<!-- HISTORIQUE -->
<div id="page-historique" class="page">
  <div class="section-header">
    <div class="card-title" style="margin:0">Historique</div>
    <button class="icon-btn" onclick="exportPDF()" title="Exporter PDF">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
    </button>
  </div>
  <div id="historyList"></div>
</div>

<!-- RÉGLAGES -->
<div id="page-settings" class="page"><div id="settingsContent"></div></div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Tableau
  </button>
  <button class="nav-btn" onclick="showPage('saisie',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    Mesure
  </button>
  <button class="nav-btn" onclick="showPage('historique',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Historique
  </button>
  <button class="nav-btn" onclick="showPage('settings',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Réglages
  </button>
</nav>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Modifier la mesure</div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="field"><label>Date &amp; heure</label><input type="datetime-local" id="editDatetime"/></div>
    <div class="field">
      <label>DEP — 3 souffles (L/min)</label>
      <div class="dep-inputs">
        <div class="dep-field"><label>Souffle 1</label><input type="number" id="editDep1" placeholder="—" min="50" max="900" oninput="updateEditDepAvg()"/></div>
        <div class="dep-field"><label>Souffle 2</label><input type="number" id="editDep2" placeholder="—" min="50" max="900" oninput="updateEditDepAvg()"/></div>
        <div class="dep-field"><label>Souffle 3</label><input type="number" id="editDep3" placeholder="—" min="50" max="900" oninput="updateEditDepAvg()"/></div>
      </div>
      <div class="dep-avg-display" id="editDepAvgDisplay" style="display:none">
        <span class="dep-avg-label">Moyenne calculée</span>
        <span class="dep-avg-value" id="editDepAvgValue">—</span>
      </div>
    </div>
    <div class="field"><label>SpO₂ (%)</label><input type="number" id="editSpO2" min="70" max="100"/></div>
    <div class="field">
      <label>Prises Easyhaler</label>
      <div class="easyhaler-btns" id="editEasyBtns">
        <button class="easyh-btn" data-val="0" onclick="selectEditEasy(0)">0</button>
        <button class="easyh-btn" data-val="1" onclick="selectEditEasy(1)">1</button>
        <button class="easyh-btn" data-val="2" onclick="selectEditEasy(2)">2</button>
        <button class="easyh-btn" data-val="3" onclick="selectEditEasy(3)">3</button>
        <button class="easyh-btn" data-val="4" onclick="selectEditEasy(4)">4</button>
        <button class="easyh-btn" data-val="5" onclick="selectEditEasy(5)">5</button>
      </div>
    </div>
    <div class="field"><label>Commentaire</label><textarea id="editComment" placeholder="Symptômes, contexte…"></textarea></div>

function calcDepAvg(prefix=''){
  const vals=['dep1','dep2','dep3'].map(id=>{const el=document.getElementById(prefix+id);return el?parseFloat(el.value):NaN;}).filter(v=>!isNaN(v)&&v>=50&&v<=900);
  if(!vals.length)return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function calcDepAvgWithWarn(prefix=''){
  const raw=['dep1','dep2','dep3'].map(id=>{const el=document.getElementById(prefix+id);const v=parseFloat(el?el.value:NaN);return{id,v};});
  const ignored=raw.filter(x=>!isNaN(x.v)&&(x.v<50||x.v>900));
  if(ignored.length)showToast('⚠️ Valeur DEP hors limites (50–900) ignorée','error');
  const vals=raw.map(x=>x.v).filter(v=>!isNaN(v)&&v>=50&&v<=900);
  if(!vals.length)return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}

function drawLineChart(id,labels,data,color,yMin,yMax){
  const canvas=document.getElementById(id);if(!canvas)return;
  const dpr=window.devicePixelRatio||1,W=canvas.offsetWidth||300,H=120;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const pad={top:10,right:10,bottom:30,left:38},w=W-pad.left-pad.right,h=H-pad.top-pad.bottom;
  const range=yMax-yMin,toX=i=>pad.left+(i/(data.length-1||1))*w,toY=v=>pad.top+h-((v-yMin)/range)*h;
  ctx.clearRect(0,0,W,H);if(!data.length)return;
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  [0.25,0.5,0.75,1].forEach(t=>{const y=pad.top+h*(1-t);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+w,y);ctx.stroke();ctx.fillStyle='rgba(107,114,128,0.7)';ctx.font='9px DM Mono,monospace';ctx.fillText(Math.round(yMin+range*t),0,y+3);});
  const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+h);grad.addColorStop(0,color+'40');grad.addColorStop(1,'transparent');
  if(data.length>1){ctx.beginPath();ctx.moveTo(toX(0),toY(data[0]));data.forEach((v,i)=>{if(i>0)ctx.lineTo(toX(i),toY(v));});ctx.lineTo(toX(data.length-1),pad.top+h);ctx.lineTo(toX(0),pad.top+h);ctx.closePath();ctx.fillStyle=grad;ctx.fill();}
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';
  data.forEach((v,i)=>{if(i===0)ctx.moveTo(toX(i),toY(v));else ctx.lineTo(toX(i),toY(v));});ctx.stroke();
  data.forEach((v,i)=>{ctx.beginPath();ctx.arc(toX(i),toY(v),3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#0d0f14';ctx.lineWidth=1.5;ctx.stroke();});
  ctx.fillStyle='rgba(107,114,128,0.7)';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(labels.length/5));
  labels.forEach((l,i)=>{if(i%step===0||i===labels.length-1)ctx.fillText(l,toX(i),H-6);});
}

function exportPDF(){
  const measures=DB.measures;if(!measures.length){showToast('Aucune donnée','error');return;}
  if(window.jspdf){_doExportPDF(measures);return;}
  const script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  script.onload=function(){_doExportPDF(measures);};
  script.onerror=function(){showToast('Erreur chargement jsPDF','error');};
  document.head.appendChild(script);
}
function _doExportPDF(measures){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const blue=[79,156,249],dark=[22,25,32],muted=[150,160,175],rowAlt=[26,29,38];
  doc.setFillColor(...dark);doc.rect(0,0,210,297,'F');
  doc.setFillColor(...blue);doc.rect(0,0,210,18,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text('AsthmeTrack \u2014 Export des mesures',10,12);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('Généré le '+new Date().toLocaleDateString('fr-FR')+' \u00e0 '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),200,12,{align:'right'});
  const cols=['Date','Heure','DEP','Souffles','Zone','SpO\u2082','Zone','Prises','Commentaire'];
  const widths=[22,16,18,22,20,14,20,14,44];
  let y=28;
  doc.setFillColor(30,34,45);doc.rect(8,y-5,194,7,'F');
  doc.setTextColor(...blue);doc.setFontSize(7);doc.setFont('helvetica','bold');
  let x=10;cols.forEach((c,i)=>{doc.text(c,x,y);x+=widths[i];});
  y+=5;
  const sorted=[...measures].sort((a,b)=>new Date(b.dt)-new Date(a.dt));
  sorted.forEach((m,idx)=>{
    if(y>282){doc.addPage();doc.setFillColor(...dark);doc.rect(0,0,210,297,'F');y=15;}
    const d=new Date(m.dt);
    const souffles=[m.dep1,m.dep2,m.dep3].filter(Boolean).join('/');
    const dz=depZone(m.dep);const zc=dz==='green'?[16,217,160]:dz==='yellow'?[245,166,35]:[240,79,79];
    const row=[
      d.toLocaleDateString('fr-FR'),
      d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
      m.dep+' L/m',
      souffles||'-',
      zoneLabel(dz),
      (m.spo2||'-')+'%',
      m.spo2?zoneLabel(spo2Zone(m.spo2)):'-',
      m.easy!=null?m.easy+' pr':'-',
      (m.comment||'').slice(0,30)
    ];
    if(idx%2===0){doc.setFillColor(...rowAlt);doc.rect(8,y-4,194,6,'F');}
    doc.setFont('helvetica','normal');doc.setFontSize(7);
    x=10;
    row.forEach((cell,i)=>{
      if(i===4){doc.setTextColor(...zc);}
      else if(i===6&&m.spo2){const sz=spo2Zone(m.spo2);doc.setTextColor(...(sz==='green'?[16,217,160]:sz==='yellow'?[245,166,35]:[240,79,79]));}
      else{doc.setTextColor(...muted);}
      doc.text(String(cell||''),x,y,{maxWidth:widths[i]-2});
      x+=widths[i];
    });
    y+=6;
  });
  doc.setTextColor(60,70,90);doc.setFontSize(7);
  doc.text('AsthmeTrack \u2022 '+sorted.length+' mesures export\u00e9es',10,292);
  doc.save('asthmetrack_'+new Date().toISOString().slice(0,10)+'.pdf');
  showToast('\u2713 PDF téléchargé');
}

// ══════════════════════════════════════════
//  GOOGLE DRIVE — SDK natif Android
//  Via @capacitor-community/google-auth
//  Pas de redirect URI, pas de PKCE manuel.
//  Chaque utilisateur accède à SON Drive.
// ══════════════════════════════════════════


// Plugin Social Login via l'objet global Capacitor (pas d'import dynamique)
function getSocialLogin() {
  if (IS_CAPACITOR && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SocialLogin) {
    return window.Capacitor.Plugins.SocialLogin;
  }
  return null;
}

async function connectDrive() {
  setSync(true);
  try {
    const SocialLogin = getSocialLogin();
    if (!SocialLogin) {
      showToast('Plugin non disponible', 'error');
      setSync(false);
      return;
    }
    await SocialLogin.initialize({ google: { webClientId: GOOGLE_CLIENT_ID } });
    const result = await SocialLogin.login({
      provider: 'google',
      options: {
        scopes: ['profile', 'email', 'https://www.googleapis.com/auth/drive.appdata'],
        filterByAuthorizedAccounts: false,
      }
    });
    const token = result.result.accessToken?.token;
    if (!token) throw new Error('No access token');
    DB.driveToken = token;
    DB.driveTokenExpiry = Date.now() + 3500 * 1000;
    DB.driveUser = result.result.profile?.email || 'Compte Google';
    DB.driveAvatar = result.result.profile?.imageUrl || null;
    await driveSyncDown();
    renderSettings();
    showToast('✓ Google Drive connecté');
  } catch(e) {
    console.error('Google Auth error:', e);
    const msg = e && e.message ? e.message : JSON.stringify(e);
    showToast('Erreur: ' + msg.slice(0,60), 'error');
  } finally {
    setSync(false);
  }
}

async function ensureValidToken() {
  if (!DB.driveToken) return false;
  if (Date.now() < DB.driveTokenExpiry - 60000) return true;
  try {
    const SocialLogin = getSocialLogin();
    if (!SocialLogin) { DB.driveToken = null; return false; }
    await SocialLogin.initialize({ google: { webClientId: GOOGLE_CLIENT_ID } });
    const result = await SocialLogin.login({
      provider: 'google',
      options: {
        scopes: ['profile', 'email', 'https://www.googleapis.com/auth/drive.appdata'],
        filterByAuthorizedAccounts: true,
      }
    });
    const token = result.result.accessToken?.token;
    if (token) {
      DB.driveToken = token;
      DB.driveTokenExpiry = Date.now() + 3500 * 1000;
      return true;
    }
  } catch(e) { DB.driveToken = null; }
  return false;
}
async function fetchDriveUserInfo(token) {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    DB.driveUser = d.email || 'Compte Google';
    DB.driveAvatar = d.picture || null;
  } catch(e) { DB.driveUser = 'Compte Google'; }
}

async function disconnectDrive() {
  if (!confirm('Déconnecter Google Drive ?')) return;
  try {
    const SocialLogin = getSocialLogin();
    if (SocialLogin) await SocialLogin.logout({ provider: 'google' });
  } catch(e) {}
  ['at_driveToken','at_driveTokenExpiry','at_driveFileId','at_driveUser','at_driveAvatar'].forEach(k => localStorage.removeItem(k));
  renderSettings();
  showToast('✓ Déconnecté');
}

async function driveSyncUp() {
  if (!await ensureValidToken()) { showToast('Non connecté à Drive', 'error'); return; }
  setSync(true);
  try {
    const data = JSON.stringify({ measures: DB.measures, bestDEP: DB.bestDEP, reminders: DB.reminders, version: 2 });
    const metadata = { name: GDRIVE_FILENAME, parents: ['appDataFolder'] };
    const url = DB.driveFileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${DB.driveFileId}?uploadType=multipart`
      : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const method = DB.driveFileId ? 'PATCH' : 'POST';
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', new Blob([data], { type: 'application/json' }));
    const r = await fetch(url, { method, headers: { Authorization: 'Bearer ' + DB.driveToken }, body: form });
    if (!r.ok) throw new Error(r.status);
    const j = await r.json();
    DB.driveFileId = j.id;
    showToast('✓ Sauvegardé sur Drive');
  } catch(e) {
    const msg = e && e.message ? e.message : (e && e.status ? 'HTTP '+e.status : JSON.stringify(e));
    console.error('driveSyncUp error:', e);
    showToast('Drive: ' + msg.slice(0,80), 'error');
  }
  finally { setSync(false); }
}

async function driveSyncDown() {
  if (!await ensureValidToken()) { showToast('Non connecté à Drive', 'error'); return; }
  setSync(true);
  try {
    const search = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${GDRIVE_FILENAME}'&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + DB.driveToken } }
    );
    const sj = await search.json();
    if (!sj.files || !sj.files.length) { showToast('Aucune sauvegarde trouvée'); setSync(false); return; }
    DB.driveFileId = sj.files[0].id;
    const dl = await fetch(
      `https://www.googleapis.com/drive/v3/files/${DB.driveFileId}?alt=media`,
      { headers: { Authorization: 'Bearer ' + DB.driveToken } }
    );
    const d = await dl.json();
    if (d.measures) DB.measures = d.measures;
    if (d.bestDEP) DB.bestDEP = d.bestDEP;
    if (d.reminders) DB.reminders = d.reminders;
    showToast('✓ Données restaurées depuis Drive');
    renderDashboard();
  } catch(e) { showToast('Erreur restauration Drive', 'error'); }
  finally { setSync(false); }
}

function driveAutoSync() { if (DB.driveToken) driveSyncUp(); }
function setSync(on) {
  document.getElementById('statusDot').className = 'status-dot' + (on ? ' syncing' : '');
  document.getElementById('syncIndicator').style.display = on ? 'block' : 'none';
}

//  SETTINGS
// ══════════════════════════════════════════
function renderSettings(){
  const isConnected=!!DB.driveToken;
  document.getElementById('settingsContent').innerHTML=`
    <div class="card">
      <div class="card-title">☁️ Google Drive</div>
      ${isConnected?`
        <div class="drive-connected">
          <div class="drive-avatar">${DB.driveAvatar?`<img src="${DB.driveAvatar}" style="width:40px;height:40px;border-radius:50%;object-fit:cover" onerror="this.style.display='none'"/>`:''}<span style="${DB.driveAvatar?'display:none':''}">👤</span></div>
          <div class="drive-info">
            <div class="drive-name">${DB.driveUser||'Compte Google'}</div>
            <div class="drive-sub">✓ Connecté — sync auto activée</div>
          </div>
        </div>
        <div class="drive-btns">
          <button class="drive-btn upload" onclick="driveSyncUp()">⬆ Sauvegarder</button>
          <button class="drive-btn download" onclick="driveSyncDown()">⬇ Restaurer</button>
          <button class="drive-btn danger" onclick="disconnectDrive()">Déconnecter</button>
        </div>
      `:`
        <p style="font-size:12px;color:var(--muted);margin-bottom:16px">
          Sauvegardez vos données sur votre Google Drive personnel. Vos données n'appartiennent qu'à vous.
        </p>
        <button class="btn-google" onclick="connectDrive()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Se connecter avec Google
        </button>
      `}
    </div>

    <div class="card">
      <div class="card-title">Calibration DEP</div>
      <div class="field"><label>Votre meilleur DEP personnel (L/min)</label><input type="number" id="bestDEPInput" value="${DB.bestDEP}" min="100" max="900"/></div>
      <button class="btn-primary" onclick="saveBestDEP()">Enregistrer</button>
    </div>

    <div class="card">
      <div class="card-title">Rappels de prises</div>
      <div id="reminderList"></div>
      <div class="add-reminder-form">
        <input type="time" id="reminderTime"/>
        <input type="text" id="reminderLabel" placeholder="ex. Matin"/>
        <button class="btn-secondary" onclick="addReminder()">+ Ajouter</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Données</div>
      <div class="setting-row"><div><div class="setting-label">Exporter PDF</div><div class="setting-sub">Rapport complet de vos mesures</div></div><button class="btn-secondary" onclick="exportPDF()">⬇ PDF</button></div>
      <div class="setting-row"><div><div class="setting-label">Supprimer tout</div><div class="setting-sub">Action irréversible</div></div><button class="btn-secondary" style="color:var(--red);border-color:var(--red)" onclick="clearAll()">Effacer</button></div>
    </div>

    <div class="card">
      <div class="card-title">Zones de référence</div>
      <div class="setting-row"><span class="zone-badge zone-green">🟢 Verte</span><span style="font-size:12px;color:var(--muted)">DEP ≥ 80% · SpO₂ ≥ 95%</span></div>
      <div class="setting-row"><span class="zone-badge zone-yellow">🟡 Jaune</span><span style="font-size:12px;color:var(--muted)">DEP 60–80% · SpO₂ 90–94%</span></div>
      <div class="setting-row"><span class="zone-badge zone-red">🔴 Rouge</span><span style="font-size:12px;color:var(--muted)">DEP &lt; 60% · SpO₂ &lt; 90%</span></div>
    </div>
  `;
  renderReminderList();
}

function saveBestDEP(){const v=parseFloat(document.getElementById('bestDEPInput').value);if(!v||v<100||v>900){showToast('⚠️ Valeur invalide','error');return;}DB.bestDEP=v;showToast('✓ Meilleur DEP sauvegardé');}
function clearAll(){if(!confirm('Effacer TOUTES les mesures ?'))return;DB.measures=[];showToast('✓ Données supprimées');}

// ── REMINDERS ──
let reminderTimers=[];
function renderReminderList(){
  const list=document.getElementById('reminderList');if(!list)return;
  const rem=DB.reminders;
  if(!rem.length){list.innerHTML=`<p style="color:var(--muted);font-size:12px;margin-bottom:10px">Aucun rappel configuré.</p>`;return;}
  list.innerHTML=rem.map((r,i)=>`<div class="reminder-item"><div class="reminder-info"><div class="reminder-time">${r.time}</div><div class="reminder-label-text">${r.label}</div></div><label class="toggle"><input type="checkbox" ${r.active?'checked':''} onchange="toggleReminder(${i})"/><span class="toggle-slider"></span></label><button class="reminder-del" onclick="deleteReminder(${i})">✕</button></div>`).join('');
}
function addReminder(){
  const time=document.getElementById('reminderTime').value,label=document.getElementById('reminderLabel').value.trim()||'Rappel';
  if(!time){showToast('⚠️ Choisir une heure','error');return;}
  const rem=DB.reminders;rem.push({time,label,active:true});DB.reminders=rem;
  scheduleReminders();renderReminderList();showToast('✓ Rappel ajouté');
}
function toggleReminder(i){const rem=DB.reminders;rem[i].active=!rem[i].active;DB.reminders=rem;scheduleReminders();renderReminderList();if(currentPage==='dashboard')renderDashboard();}
function deleteReminder(i){const rem=DB.reminders;rem.splice(i,1);DB.reminders=rem;scheduleReminders();renderReminderList();}
function scheduleReminders(){
  reminderTimers.forEach(t=>clearTimeout(t));reminderTimers=[];
  const now=new Date();
  DB.reminders.filter(r=>r.active).forEach(r=>{
    const[h,m]=r.time.split(':').map(Number),target=new Date(now);
    target.setHours(h,m,0,0);if(target<=now)target.setDate(target.getDate()+1);
    const t=setTimeout(async()=>{
      try {
        // Sur Android Capacitor : utilise le plugin Local Notifications
        if(IS_CAPACITOR && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications){
          const LN = window.Capacitor.Plugins.LocalNotifications;
          await LN.schedule({notifications:[{
            title:'AsthmeTrack 💊',
            body: r.label+' — Penser à votre Easyhaler !',
            id: Math.floor(Math.random()*100000),
            schedule:{ at: new Date(Date.now()+100) }
          }]});
        } else if(typeof Notification !== 'undefined' && Notification.permission==='granted'){
          // Fallback web
          new Notification('AsthmeTrack 💊',{body:r.label+' — Penser à votre Easyhaler !'});
        }
      } catch(e){ console.warn('Notification error:', e); }
      scheduleReminders();
    },target-now);
    reminderTimers.push(t);
  });
}

// Capture toutes les erreurs JS pour debug
window.onerror = function(msg, src, line, col, err) {
  showToast('JS Error: ' + msg, 'error');
  console.error('GLOBAL ERROR:', msg, src, line, col, err);
};
window.addEventListener('unhandledrejection', function(e) {
  showToast('Promise Error: ' + e.reason, 'error');
  console.error('UNHANDLED PROMISE:', e.reason);
});

document.addEventListener('DOMContentLoaded',()=>{
  renderDashboard();
  // Demande la permission de notifications au démarrage
  if (!IS_CAPACITOR && typeof Notification !== 'undefined' && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  if (IS_CAPACITOR && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
    window.Capacitor.Plugins.LocalNotifications.requestPermissions().catch(function(){});
  }
  scheduleReminders(); // Les rappels utilisent le plugin natif
  const el=document.getElementById('inputDatetime');
  if(el){const now=new Date();now.setSeconds(0,0);el.value=now.toISOString().slice(0,16);}
});
