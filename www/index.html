<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AsthmeTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e222d;
    --border: #2a2f3d;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #4f9cf9;
    --accent2: #7c3aed;
    --green: #10d9a0;
    --yellow: #f5a623;
    --red: #f04f4f;
    --danger: #f04f4f;
    --green-dim: rgba(16,217,160,0.12);
    --yellow-dim: rgba(245,166,35,0.12);
    --red-dim: rgba(240,79,79,0.12);
    --radius: 14px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  /* ── Light theme ────────────────────────────────────────────────────────── */
  html[data-theme="light"] {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #edf0f7;
    --border: #d1d9e6;
    --text: #1a1d27;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --green: #059669;
    --yellow: #d97706;
    --red: #dc2626;
    --danger: #dc2626;
    --green-dim: rgba(5,150,105,0.12);
    --yellow-dim: rgba(217,119,6,0.12);
    --red-dim: rgba(220,38,38,0.12);
  }
  html[data-theme="light"] body { background: var(--bg); }
  html[data-theme="light"] .app-header { background: rgba(244,246,251,0.92); }
  html[data-theme="light"] .nav { background: rgba(244,246,251,0.97); }
  html[data-theme="light"] .modal-overlay { background: rgba(0,0,0,.4); }
  html[data-theme="light"] .btn-google { background: #fff; }
  html[data-theme="light"] canvas { filter: none; }
  /* chart gridlines readable on light bg */

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 16px; min-height: 100vh; overflow-x: hidden; }

  .app-header { position: sticky; top: 0; z-index: 100; background: rgba(13,15,20,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
  .app-header h1 { font-family: var(--font-head); font-size: 20px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.syncing { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(13,15,20,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 0); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 4px; background: none; border: none; color: var(--muted); cursor: pointer; transition: color .2s; font-family: var(--font-mono); font-size: 12px; }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.5; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active svg { filter: drop-shadow(0 0 4px var(--accent)); }

  .page { display: none; padding: 20px 16px 100px; animation: fadeIn .25s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
  .card-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }

  .zone-green { color: var(--green); background: var(--green-dim); }
  .zone-yellow { color: var(--yellow); background: var(--yellow-dim); }
  .zone-red { color: var(--red); background: var(--red-dim); }
  .zone-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 13px; font-weight: 500; }

  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .metric-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; position: relative; overflow: hidden; }
  .metric-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .metric-box.green::before { background: var(--green); }
  .metric-box.yellow::before { background: var(--yellow); }
  .metric-box.red::before { background: var(--red); }
  .metric-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .metric-value { font-family: var(--font-head); font-size: 30px; font-weight: 800; line-height: 1; }
  .metric-unit { font-family: var(--font-mono); font-size: 13px; color: var(--muted); margin-top: 2px; }
  .metric-pct { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .dep-measurements { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .chart-wrap { position: relative; height: 120px; margin-top: 8px; }
  canvas { width: 100% !important; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 16px; padding: 12px 14px; outline: none; transition: border-color .2s; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; }

  .dep-inputs { display: flex; gap: 8px; }
  .dep-field { flex: 1; }
  .dep-field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; text-align: center; }
  .dep-field input { width: 100%; text-align: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-head); font-size: 20px; font-weight: 700; padding: 12px 6px; outline: none; transition: border-color .2s; }
  .dep-field input:focus { border-color: var(--accent); }
  .dep-avg-display { background: rgba(79,156,249,.08); border: 1px solid rgba(79,156,249,.3); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .dep-avg-label { font-size: 13px; color: var(--muted); }
  .dep-avg-value { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--accent); }

  .easyhaler-btns { display: flex; gap: 6px; }
  .easyh-btn { flex: 1; padding: 14px 4px; background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; color: var(--muted); font-family: var(--font-head); font-size: 20px; font-weight: 700; cursor: pointer; transition: all .15s; text-align: center; }
  .easyh-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(79,156,249,.12); box-shadow: 0 0 12px rgba(79,156,249,.2); }

  .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #fff; font-family: var(--font-head); font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: .5px; transition: opacity .2s, transform .1s; }
  .btn-primary:active { opacity: .85; transform: scale(.98); }
  .btn-secondary { padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 15px; cursor: pointer; transition: border-color .2s; }
  .btn-secondary:hover { border-color: var(--accent); }

  /* Google Sign-In button — style officiel Google */
  .btn-google {
    width: 100%; padding: 14px 20px;
    background: #fff; border: 1px solid #dadce0;
    border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    font-family: 'Roboto', var(--font-mono); font-size: 16px; font-weight: 500;
    color: #3c4043; transition: background .15s, box-shadow .15s;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  .btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
  .btn-google:active { background: #f1f3f4; }
  .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

  .history-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .history-date { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .history-vals { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .history-chip { font-size: 14px; padding: 3px 9px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); }
  .history-comment { font-size: 14px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-action-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 17px; padding: 2px; transition: color .2s; }
  .icon-action-btn.edit:hover { color: var(--accent); }
  .icon-action-btn.del:hover { color: var(--red); }

  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 15px; color: var(--text); }
  .setting-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .toggle { position: relative; width: 46px; height: 26px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 26px; cursor: pointer; transition: background .2s; }
  .toggle-slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform .2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  .reminder-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; gap: 10px; }
  .reminder-info { flex: 1; }
  .reminder-time { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--accent); }
  .reminder-label-text { font-size: 14px; color: var(--muted); margin-top: 2px; }
  .reminder-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
  .add-reminder-form { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .add-reminder-form input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 15px; padding: 10px 12px; outline: none; transition: border-color .2s; }
  .add-reminder-form input:focus { border-color: var(--accent); }
  .add-reminder-form input[type=time] { width: 110px; }
  .add-reminder-form input[type=text] { flex: 1; min-width: 120px; }

  /* Drive card */
  .drive-connected { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1px solid rgba(16,217,160,.3); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .drive-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green-dim); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .drive-info { flex: 1; }
  .drive-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .drive-sub { font-size: 13px; color: var(--green); margin-top: 2px; }
  .drive-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .drive-btn { flex: 1; padding: 11px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 14px; cursor: pointer; transition: all .2s; text-align: center; }
  .drive-btn:hover { border-color: var(--accent); color: var(--accent); }
  .drive-btn.upload { border-color: rgba(79,156,249,.4); color: var(--accent); background: rgba(79,156,249,.08); }
  .drive-btn.download { border-color: rgba(16,217,160,.4); color: var(--green); background: rgba(16,217,160,.08); }
  .drive-btn.danger { color: var(--red); }
  .drive-btn.danger:hover { border-color: var(--red); }

  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; transform: translateY(40px); transition: transform .25s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 20px; border-radius: 30px; font-family: var(--font-head); font-size: 15px; font-weight: 700; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--red); color: #fff; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color .2s; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn svg { width: 16px; height: 16px; }

  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .3; }
  .empty-state p { font-size: 15px; }

  .reminder-badge { font-size: 13px; padding: 4px 10px; background: rgba(79,156,249,.1); border: 1px solid rgba(79,156,249,.3); border-radius: 20px; color: var(--accent); margin-right: 6px; margin-bottom: 6px; display: inline-block; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* Champ DEP hors limites (< 50 ou > 900) */
  .dep-field input.dep-invalid {
    border-color: var(--danger) !important;
    box-shadow: 0 0 0 2px rgba(240,79,79,.25);
  }
  .dep-field:has(input.dep-invalid)::after {
    content: '⚠ Hors limites (50–900)';
    display: block;
    font-size: 13px;
    color: var(--danger);
    margin-top: 4px;
  }

  /* Champ SpO2 hors limites */
  .spo2-field input.spo2-invalid,
  .field input.spo2-invalid {
    border-color: var(--danger) !important;
    box-shadow: 0 0 0 2px rgba(240,79,79,.25);
  }
  .spo2-wrap { position: relative; }
  .spo2-hint {
    font-size: 13px;
    color: var(--danger);
    margin-top: 4px;
    display: none;
  }
  .spo2-hint.visible { display: block; }
</style>
  <script src="jspdf.umd.min.js"></script>
</head>
<body>

<header class="app-header">
  <h1>AsthmeTrack</h1>
  <div class="header-right">
    <div id="syncIndicator" style="font-size:13px;color:var(--muted);display:none">↕ Drive</div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active"><div id="dashboardContent"></div></div>

<!-- SAISIE -->
<div id="page-saisie" class="page">
  <div class="card">
    <div class="card-title">Nouvelle mesure</div>
    <div class="field">
      <label>Date &amp; heure</label>
      <input type="datetime-local" id="inputDatetime"/>
    </div>
    <div class="field">
      <label>DEP — Moyenne sur 3 souffles (L/min)</label>
      <div class="dep-inputs">
        <div class="dep-field"><label>Souffle 1</label><input type="number" id="dep1" placeholder="—" min="50" max="900" oninput="updateDepAvg()"/></div>
        <div class="dep-field"><label>Souffle 2</label><input type="number" id="dep2" placeholder="—" min="50" max="900" oninput="updateDepAvg()"/></div>
        <div class="dep-field"><label>Souffle 3</label><input type="number" id="dep3" placeholder="—" min="50" max="900" oninput="updateDepAvg()"/></div>
      </div>
      <div class="dep-avg-display" id="depAvgDisplay" style="display:none">
        <span class="dep-avg-label">Moyenne calculée</span>
        <span class="dep-avg-value" id="depAvgValue">—</span>
      </div>
    </div>
    <div class="field">
      <label>SpO₂ — Oxymétrie de pouls (%)</label>
      <div class="spo2-wrap"><input type="number" id="inputSpO2" placeholder="ex. 97" min="70" max="100" oninput="updateSpo2Display(this)"/><span class="spo2-hint" id="spo2Hint">⚠ Hors limites (70–100)</span></div>
    </div>
    <div class="field">
      <label>Prises Easyhaler aujourd'hui</label>
      <div class="easyhaler-btns">
        <button class="easyh-btn" data-val="0" onclick="selectEasy(0)">0</button>
        <button class="easyh-btn" data-val="1" onclick="selectEasy(1)">1</button>
        <button class="easyh-btn" data-val="2" onclick="selectEasy(2)">2</button>
        <button class="easyh-btn" data-val="3" onclick="selectEasy(3)">3</button>
        <button class="easyh-btn" data-val="4" onclick="selectEasy(4)">4</button>
        <button class="easyh-btn" data-val="5" onclick="selectEasy(5)">5</button>
      </div>
    </div>
    <div class="field">
      <label>Commentaire (facultatif)</label>
      <textarea id="inputComment" placeholder="Symptômes, contexte, météo…"></textarea>
    </div>
    <button class="btn-primary" onclick="saveMeasure()">Enregistrer la mesure</button>
  </div>
</div>

<!-- HISTORIQUE -->
<div id="page-historique" class="page">
  <div class="section-header">
    <div class="card-title" style="margin:0">Historique</div>
    <button class="icon-btn" onclick="exportPDF()" title="Exporter PDF">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
    </button>
  </div>
  <div id="historyList"></div>
</div>

<!-- RÉGLAGES -->
<div id="page-settings" class="page"><div id="settingsContent"></div></div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Tableau
  </button>
  <button class="nav-btn" onclick="showPage('saisie',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    Mesure
  </button>
  <button class="nav-btn" onclick="showPage('historique',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Historique
  </button>

// ══════════════════════════════════════════
//  CONFIG GOOGLE DRIVE
//  ⚠️  Remplacer par votre Client ID Google Cloud
//  (type "Application Android" ou "Application de bureau")
//  Les données vont dans le Drive de CHAQUE utilisateur — pas le vôtre.

const GOOGLE_CLIENT_ID = '__GOOGLE_CLIENT_ID__';
const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.email';
const GDRIVE_FILENAME = 'asthmetrack_data.json';
const IS_CAPACITOR = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());

// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════
const DB = {
  get measures() { try{return JSON.parse(localStorage.getItem('at_measures')||'[]');}catch(e){return[];} },
  set measures(v) { localStorage.setItem('at_measures',JSON.stringify(v)); },
  get bestDEP() { return parseFloat(localStorage.getItem('at_bestDEP')||'450'); },
  set bestDEP(v) { localStorage.setItem('at_bestDEP',v); },
  get reminders() { try{return JSON.parse(localStorage.getItem('at_reminders')||'[]');}catch(e){return[];} },
  set reminders(v) { localStorage.setItem('at_reminders',JSON.stringify(v)); },
  // ── token fields stay in localStorage for synchronous access ──────────
  // On Capacitor the token is ALSO persisted in CapacitorPreferences (secure
  // storage backed by EncryptedSharedPreferences on Android / Keychain on iOS).
  // Call SecureStore.save/load at connect & restore time; the in-memory
  // localStorage copy is the fast synchronous accessor used everywhere else.
  get driveToken() { return localStorage.getItem('at_driveToken')||null; },
  set driveToken(v) {
    if (v) { localStorage.setItem('at_driveToken',v); SecureStore.save('at_driveToken',v); }
    else   { localStorage.removeItem('at_driveToken'); SecureStore.remove('at_driveToken'); }
  },
  get driveTokenExpiry() { return parseInt(localStorage.getItem('at_driveTokenExpiry')||'0'); },
  set driveTokenExpiry(v) { localStorage.setItem('at_driveTokenExpiry',String(v)); SecureStore.save('at_driveTokenExpiry',String(v)); },
  get driveFileId() { return localStorage.getItem('at_driveFileId')||null; },
  set driveFileId(v) { v?localStorage.setItem('at_driveFileId',v):localStorage.removeItem('at_driveFileId'); },
  get driveUser() { return localStorage.getItem('at_driveUser')||null; },
  set driveUser(v) { v?localStorage.setItem('at_driveUser',v):localStorage.removeItem('at_driveUser'); },
  get driveAvatar() { return localStorage.getItem('at_driveAvatar')||null; },
  set driveAvatar(v) { v?localStorage.setItem('at_driveAvatar',v):localStorage.removeItem('at_driveAvatar'); },
};

// ══════════════════════════════════════════
//  SECURE STORAGE  (Capacitor Preferences → localStorage fallback)
//  Wraps @capacitor/preferences so the OAuth token is stored in
//  EncryptedSharedPreferences (Android) / Keychain (iOS) instead of
//  plain localStorage.  Falls back transparently on web.
// ══════════════════════════════════════════
const SecureStore = {
  _prefs() { return IS_CAPACITOR && window.Capacitor?.Plugins?.Preferences || null; },
  async save(key, value) {
    try { const p = this._prefs(); if (p) await p.set({ key, value }); } catch(e) { console.warn('SecureStore.save', e); }
  },
  async remove(key) {
    try { const p = this._prefs(); if (p) await p.remove({ key }); } catch(e) { console.warn('SecureStore.remove', e); }
  },
  /** Called once at boot — copies any Preferences value back into localStorage so DB getters work synchronously. */
  async init() {
    const p = this._prefs();
    if (!p) return;
    for (const key of ['at_driveToken','at_driveTokenExpiry']) {
      try {
        const { value } = await p.get({ key });
        if (value != null) localStorage.setItem(key, value);
      } catch(e) {}
    }
  },
};

// Active language — reads from localStorage, defaults to 'fr'
let _lang = localStorage.getItem('at_lang') || 'fr';
function t(key, ...args) {
  const v = LANG[_lang]?.[key] ?? LANG['fr'][key];
  return (typeof v === 'function') ? v(...args) : (v ?? key);
}
function setLang(l) {
  _lang = l;
  localStorage.setItem('at_lang', l);
  document.documentElement.lang = l;
  _rerender();
}
function _rerender() {
  // Re-render every visible section and static HTML strings
  renderNav();
  renderStaticHTML();
  const page = currentPage;
  if (page === 'dashboard')   renderDashboard();
  if (page === 'historique')  renderHistory();
  if (page === 'settings')    renderSettings();
  if (page === 'saisie')      renderSaisieLabels();
}


// ══════════════════════════════════════════
//  THEME  (dark / light)
// ══════════════════════════════════════════
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  localStorage.setItem('at_theme', dark ? 'dark' : 'light');
}
function isDark() { return localStorage.getItem('at_theme') !== 'light'; }
// Apply immediately to avoid flash
applyTheme(isDark());

//  ZONES
// ══════════════════════════════════════════
function depZone(dep){const p=(dep/DB.bestDEP)*100;return p>=80?'green':p>=60?'yellow':'red';}
function spo2Zone(s){return s>=95?'green':s>=90?'yellow':'red';}
function zoneLabel(z){return{green:t('zone_green'),yellow:t('zone_yellow'),red:t('zone_red')}[z];}
function zoneClass(z){return'zone-'+z;}


// ══════════════════════════════════════════
//  DYNAMIC LABEL HELPERS
// ══════════════════════════════════════════
function renderNav() {
  const btns = document.querySelectorAll('.nav-btn');
  const keys = ['nav_dashboard','nav_measure','nav_history','nav_settings'];
  btns.forEach((btn, i) => {
    // last child is the text node (after the svg)
    const textNode = [...btn.childNodes].find(n => n.nodeType === 3 && n.textContent.trim());
    if (textNode) textNode.textContent = '\n    ' + t(keys[i]) + '\n  ';
  });
}

function renderSaisieLabels() {
  // Use a helper that skips null elements silently
  const set = (sel, txt) => { const el = document.querySelector(sel); if (el) el.textContent = txt; };

  // ── Measure form (page-saisie) ──────────────────────────────────────────
  set('#page-saisie .card-title', t('new_measure'));

  // Use :scope-safe individual field IDs and known structure instead of
  // fragile nth-child indexing (dep-field labels pollute the NodeList).
  // datetime label: first direct label inside the first .field
  const fields = document.querySelectorAll('#page-saisie .field');

function _depFieldId(prefix,n){return prefix?prefix+'Dep'+n:'dep'+n;}
function calcDepAvg(prefix=''){
  const vals=[1,2,3].map(n=>{const el=document.getElementById(_depFieldId(prefix,n));return el?parseFloat(el.value):NaN;}).filter(v=>!isNaN(v)&&v>=50&&v<=900);
  if(!vals.length)return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function calcDepAvgWithWarn(prefix=''){
  const raw=[1,2,3].map(n=>{const el=document.getElementById(_depFieldId(prefix,n));const v=parseFloat(el?el.value:NaN);return{n,v};});
  const ignored=raw.filter(x=>!isNaN(x.v)&&(x.v<50||x.v>900));
  if(ignored.length)showToast(t('err_dep_range'),'error');
  const vals=raw.map(x=>x.v).filter(v=>!isNaN(v)&&v>=50&&v<=900);
  if(!vals.length)return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function updateSpo2Display(el){
  const v=parseFloat(el.value),hintId=el.id==='inputSpO2'?'spo2Hint':'editSpo2Hint',hint=document.getElementById(hintId);
  if(!el.value){el.classList.remove('spo2-invalid');if(hint)hint.classList.remove('visible');return;}
  if(!isNaN(v)&&(v<70||v>100)){el.classList.add('spo2-invalid');if(hint)hint.classList.add('visible');}
  else{el.classList.remove('spo2-invalid');if(hint)hint.classList.remove('visible');}
}
function updateDepAvg(){
  const avg=calcDepAvg(''),d=document.getElementById('depAvgDisplay'),v=document.getElementById('depAvgValue');
  if(avg!==null){d.style.display='flex';v.textContent=avg+' L/min';}else d.style.display='none';
  // Signale visuellement chaque champ hors limites en temps réel
  [1,2,3].forEach(n=>{
    const el=document.getElementById('dep'+n);
    if(!el||el.value==='')return el&&el.classList.remove('dep-invalid');
    const v2=parseFloat(el.value);
    if(!isNaN(v2)&&(v2<50||v2>900)){
      el.classList.add('dep-invalid');
    }else{
      el.classList.remove('dep-invalid');
    }
  });
}
function updateEditDepAvg(){
  const avg=calcDepAvg('edit'),d=document.getElementById('editDepAvgDisplay'),v=document.getElementById('editDepAvgValue');
  if(avg!==null){d.style.display='flex';v.textContent=avg+' L/min';}else d.style.display='none';
  [1,2,3].forEach(n=>{
    const el=document.getElementById('editDep'+n);
    if(!el||el.value==='')return el&&el.classList.remove('dep-invalid');
    const v2=parseFloat(el.value);
    if(!isNaN(v2)&&(v2<50||v2>900)){
      el.classList.add('dep-invalid');
    }else{
      el.classList.remove('dep-invalid');
    }
  });
}

function drawLineChart(id,labels,data,color,yMin,yMax){
  const canvas=document.getElementById(id);if(!canvas)return;
  const dpr=window.devicePixelRatio||1,W=canvas.offsetWidth||300,H=120;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const pad={top:10,right:10,bottom:30,left:38},w=W-pad.left-pad.right,h=H-pad.top-pad.bottom;
  // Ajuste les bornes dynamiquement pour que les points extrêmes restent visibles
  if(data.length){const lo=Math.min(...data),hi=Math.max(...data);yMin=Math.min(yMin,lo);yMax=Math.max(yMax,hi);}
  const range=yMax-yMin||1,toX=i=>pad.left+(i/(data.length-1||1))*w,toY=v=>pad.top+h-((v-yMin)/range)*h;
  ctx.clearRect(0,0,W,H);if(!data.length)return;
  const _gridCol=getComputedStyle(document.documentElement).getPropertyValue('--border').trim()||'rgba(200,210,220,0.3)';
  ctx.strokeStyle=_gridCol+'88';ctx.lineWidth=1;
  [0.25,0.5,0.75,1].forEach(t=>{const y=pad.top+h*(1-t);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+w,y);ctx.stroke();ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim()||'#6b7280';ctx.font='9px DM Mono,monospace';ctx.fillText(Math.round(yMin+range*t),0,y+3);});
  const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+h);grad.addColorStop(0,color+'40');grad.addColorStop(1,'transparent');
  if(data.length>1){ctx.beginPath();ctx.moveTo(toX(0),toY(data[0]));data.forEach((v,i)=>{if(i>0)ctx.lineTo(toX(i),toY(v));});ctx.lineTo(toX(data.length-1),pad.top+h);ctx.lineTo(toX(0),pad.top+h);ctx.closePath();ctx.fillStyle=grad;ctx.fill();}
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';
  data.forEach((v,i)=>{if(i===0)ctx.moveTo(toX(i),toY(v));else ctx.lineTo(toX(i),toY(v));});ctx.stroke();
  data.forEach((v,i)=>{ctx.beginPath();ctx.arc(toX(i),toY(v),3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim()||'#0d0f14';ctx.lineWidth=1.5;ctx.stroke();});
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim()||'#6b7280';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(labels.length/5));
  labels.forEach((l,i)=>{if(i%step===0||i===labels.length-1)ctx.fillText(l,toX(i),H-6);});
}

async function _doExportPDF(measures){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const blue=[79,156,249],dark=[22,25,32],muted=[150,160,175],rowAlt=[26,29,38];
  doc.setFillColor(...dark);doc.rect(0,0,210,297,'F');
  doc.setFillColor(...blue);doc.rect(0,0,210,18,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text(t('pdf_title'),10,12);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text(t('pdf_generated',new Date().toLocaleDateString(t('locale')),new Date().toLocaleTimeString(t('locale'),{hour:'2-digit',minute:'2-digit'})),200,12,{align:'right'});
  const cols=t('pdf_cols');
  const widths=[22,16,18,22,20,14,20,14,44];
  let y=28;
  doc.setFillColor(30,34,45);doc.rect(8,y-5,194,7,'F');
  doc.setTextColor(...blue);doc.setFontSize(7);doc.setFont('helvetica','bold');
  let x=10;cols.forEach((c,i)=>{doc.text(c,x,y);x+=widths[i];});
  y+=5;
  const sorted=[...measures].sort((a,b)=>new Date(b.dt)-new Date(a.dt));
  sorted.forEach((m,idx)=>{
    if(y>282){doc.addPage();doc.setFillColor(...dark);doc.rect(0,0,210,297,'F');y=15;}
    const d=new Date(m.dt);
    const souffles=[m.dep1,m.dep2,m.dep3].filter(Boolean).join('/');
    const dz=depZone(m.dep);const zc=dz==='green'?[16,217,160]:dz==='yellow'?[245,166,35]:[240,79,79];
    const row=[
      d.toLocaleDateString('fr-FR'),
      d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
      m.dep+' L/m',
      souffles||'-',
      zoneLabel(dz),
      (m.spo2||'-')+'%',
      m.spo2?zoneLabel(spo2Zone(m.spo2)):'-',
      m.easy!=null?m.easy+' '+t('prise_short'):'-',
      (m.comment||'').slice(0,30)
    ];
    if(idx%2===0){doc.setFillColor(...rowAlt);doc.rect(8,y-4,194,6,'F');}
    doc.setFont('helvetica','normal');doc.setFontSize(7);
    x=10;
    row.forEach((cell,i)=>{
      if(i===4){doc.setTextColor(...zc);}
      else if(i===6&&m.spo2){const sz=spo2Zone(m.spo2);doc.setTextColor(...(sz==='green'?[16,217,160]:sz==='yellow'?[245,166,35]:[240,79,79]));}
      else{doc.setTextColor(...muted);}
      doc.text(String(cell||''),x,y,{maxWidth:widths[i]-2});
      x+=widths[i];
    });
    y+=6;
  });
  doc.setTextColor(60,70,90);doc.setFontSize(7);
  doc.text(t('pdf_footer',sorted.length),10,292);

  // ── Page 2 : Graphes DEP et SpO₂ ──────────────────────────────────────
  const canvasDep = document.getElementById('chartDEP');
  const canvasSpo = document.getElementById('chartSPO2');
  if (canvasDep || canvasSpo) {
    doc.addPage();
    doc.setFillColor(...dark); doc.rect(0,0,210,297,'F');
    doc.setFillColor(...blue); doc.rect(0,0,210,12,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(11); doc.setFont('helvetica','bold');

        doc.setFillColor(30,34,45); doc.rect(8,gy-5,194,chartH+12,'F');

  }
  // ──────────────────────────────────────────────────────────────────────

  const filename = 'asthmetrack_'+new Date().toISOString().slice(0,10)+'.pdf';
  if (IS_CAPACITOR) {
    // Android : sauvegarde dans le dossier Documents via @capacitor/filesystem
    // puis propose le partage via @capacitor/share
    const b64data = doc.output('datauristring').split(',')[1]; // base64 pur sans préfixe
    try {
      // Les plugins Capacitor sont exposés sur window.Capacitor.Plugins
      const Filesystem = window.Capacitor?.Plugins?.Filesystem;
      const Share = window.Capacitor?.Plugins?.Share;
      if (!Filesystem) throw new Error('Plugin Filesystem non disponible — relancez après npx cap sync');
      await Filesystem.writeFile({
        path: filename,
        data: b64data,
        directory: 'DOCUMENTS',
        recursive: true,
      });
      showToast('✓ PDF sauvegardé dans Documents');
      if (Share) {
        const uriResult = await Filesystem.getUri({ path: filename, directory: 'DOCUMENTS' });
        await Share.share({ title: filename, url: uriResult.uri, dialogTitle: 'Partager le PDF' });
      }
    } catch(fsErr) {
      console.error('PDF Filesystem error:', fsErr);
      showToast(t('pdf_save_error',(fsErr.message||'').slice(0,60)), 'error');
    }
  } else {
    doc.save(filename);
  }
  showToast(t('toast_pdf_done'));
}

// Plugin Social Login via l'objet global Capacitor (pas d'import dynamique)
function getSocialLogin() {
  if (IS_CAPACITOR && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SocialLogin) {
    return window.Capacitor.Plugins.SocialLogin;
  }
  return null;
}


// Extrait le token OAuth2 Drive depuis la réponse du plugin SocialLogin
// Le plugin @capgo/capacitor-social-login retourne {idToken, accessToken, scopes} directement
// (pas de wrapper .result comme on pourrait l'attendre)
function extractDriveToken(result) {
  // Plusieurs shapes possibles selon version du plugin et plateforme
  const r = result?.result ?? result;
  // accessToken peut être une string directe ou un objet {token}
  const token = (typeof r?.accessToken === 'string' ? r.accessToken : r?.accessToken?.token)
             || r?.idToken;
  return token || null;
}
function extractDriveProfile(result) {
  const r = result?.result ?? result;
  // Le profil peut venir d'un champ profile, ou être décodé de l'idToken JWT
  if (r?.profile) return { email: r.profile.email || r.profile.name || 'Compte Google', avatar: r.profile.imageUrl || r.profile.picture || null };
  // Décode le payload de l'idToken (base64url) pour extraire email et picture
  try {
    const payload = JSON.parse(atob(r.idToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    return { email: payload.email || 'Compte Google', avatar: payload.picture || null };
  } catch(e) {}
  return { email: 'Compte Google', avatar: null };
}

// Listener global pour recevoir le résultat du login Android
// (SocialLogin.login() lance une Activity native — la promesse ne résout jamais sur Android)
let _driveLoginListener = null;

async function connectDrive() {
  setSync(true);
  try {
    const SocialLogin = getSocialLogin();
    if (!SocialLogin) {
      showToast(t('drive_plugin_unavailable'),'error');
      setSync(false);
      return;
    }
    await SocialLogin.initialize({ google: { webClientId: GOOGLE_CLIENT_ID } });

    // Sur Android comme sur Web, login() résout la promesse après retour de l'Activity
    // (call.resolve() est appelé dans un Runnable Java après GetCredentialResponse)
    const result = await SocialLogin.login({
      provider: 'google',
      options: { scopes: ['profile', 'email', 'https://www.googleapis.com/auth/drive.appdata'], filterByAuthorizedAccounts: false },
    });
    console.log('Drive login result:', JSON.stringify(result));
    const token = extractDriveToken(result);
    if (!token) { console.error('Drive auth result:', JSON.stringify(result)); throw new Error('Token Drive introuvable — vérifiez la config Google Cloud Console.'); }
    const profile = extractDriveProfile(result);
    DB.driveToken = token;
    DB.driveTokenExpiry = Date.now() + 3500 * 1000;
    DB.driveUser = profile.email;
    DB.driveAvatar = profile.avatar;
    renderSettings();
    showToast(t('drive_connected_toast'));
    // Vérifie s'il existe une sauvegarde sur Drive sans écraser les données locales
    await _driveCheckAndPrompt();
  } catch(e) {
    console.error('Google Auth error:', e);
    showToast('Drive: ' + (e.message||JSON.stringify(e)).slice(0,80), 'error');
  } finally {
    if (!IS_CAPACITOR) setSync(false);
  }
}

async function ensureValidToken() {
  if (!DB.driveToken) return false;
  if (Date.now() < DB.driveTokenExpiry - 60000) return true;
  try {
    const SocialLogin = getSocialLogin();
    if (!SocialLogin) { DB.driveToken = null; return false; }
    await SocialLogin.initialize({ google: { webClientId: GOOGLE_CLIENT_ID } });
    const result = await SocialLogin.login({
      provider: 'google',
      options: {
        scopes: ['profile', 'email', 'https://www.googleapis.com/auth/drive.appdata'],
        filterByAuthorizedAccounts: true,
      }
    });
    const token = extractDriveToken(result);
    if (token) {
      DB.driveToken = token;
      DB.driveTokenExpiry = Date.now() + 3500 * 1000;
      return true;
    }
  } catch(e) { DB.driveToken = null; }
  return false;
}
async function fetchDriveUserInfo(token) {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    DB.driveUser = d.email || 'Compte Google';
    DB.driveAvatar = d.picture || null;
  } catch(e) { DB.driveUser = 'Compte Google'; }
}


async function _driveCheckAndPrompt() {
  // Vérifie si une sauvegarde existe sur Drive
  setSync(true);
  try {
    const search = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${GDRIVE_FILENAME}'&fields=files(id,modifiedTime,size)`,
      { headers: { Authorization: 'Bearer ' + DB.driveToken } }
    );
    if (!search.ok) {
      const err = await search.text();
      console.error('Drive search error:', search.status, err);
      showToast('Drive: erreur API ' + search.status, 'error');
      setSync(false);
      return;
    }
    const sj = await search.json();
    setSync(false);

    const hasRemote = sj.files && sj.files.length > 0;
    const hasLocal = DB.measures && DB.measures.length > 0;

    if (!hasRemote && !hasLocal) {
      // Rien nulle part — rien à faire
      showToast(t('drive_connected_no_backup'));
      return;
    }

    if (!hasRemote && hasLocal) {
      // Données locales seulement → propose de sauvegarder
      if (confirm(t('drive_no_backup').replace('%n', DB.measures.length))) {
        await driveSyncUp();
      }
      return;
    }

    if (hasRemote && !hasLocal) {
      // Backup Drive seulement → restaure directement
      DB.driveFileId = sj.files[0].id;
      await driveSyncDown();
      return;
    }

    // Les deux existent → affiche un choix explicite
    const modDate = new Date(sj.files[0].modifiedTime).toLocaleDateString(t('locale'), {
      day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const choice = confirm(t('drive_conflict', DB.measures.length, modDate));
    DB.driveFileId = sj.files[0].id;
    if (choice) {
      await driveSyncDown();
    } else {
      await driveSyncUp();
    }
  } catch(e) {
    setSync(false);
    console.error('_driveCheckAndPrompt error:', e);
    showToast('Drive: ' + (e.message||'erreur inconnue').slice(0,60), 'error');
  }
}

async function disconnectDrive() {
  if (!confirm(t('drive_disconnect_confirm'))) return;
  try {
    const SocialLogin = getSocialLogin();
    if (SocialLogin) await SocialLogin.logout({ provider: 'google' });
  } catch(e) {}
  ['at_driveToken','at_driveTokenExpiry','at_driveFileId','at_driveUser','at_driveAvatar'].forEach(k => localStorage.removeItem(k));
  SecureStore.remove('at_driveToken');
  SecureStore.remove('at_driveTokenExpiry');
  renderSettings();
  showToast(t('drive_disconnect_toast'));
}

async function driveSyncUp() {
  if (!await ensureValidToken()) { showToast(t('drive_not_connected'),'error'); return; }
  setSync(true);
  try {
    const data = JSON.stringify({ measures: DB.measures, bestDEP: DB.bestDEP, reminders: DB.reminders, version: 2 });
    const isUpdate = !!DB.driveFileId;
    const url = isUpdate
      // PATCH : mise à jour — pas de parents dans le metadata (erreur 403 sinon)
      ? 'https://www.googleapis.com/upload/drive/v3/files/' + DB.driveFileId + '?uploadType=multipart'
      // POST : création — parents requis pour cibler appDataFolder
      : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const method = isUpdate ? 'PATCH' : 'POST';
    // Sur PATCH on n'envoie pas parents (Drive API v3 le rejette avec 403)
    const metadata = isUpdate
      ? { name: GDRIVE_FILENAME }
      : { name: GDRIVE_FILENAME, parents: ['appDataFolder'] };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', new Blob([data], { type: 'application/json' }));
    let r = await fetch(url, { method, headers: { Authorization: 'Bearer ' + DB.driveToken }, body: form });
    // Si 404 sur PATCH : le fichier n'existe plus sur Drive, on recrée
    if (!r.ok && r.status === 404 && isUpdate) {
      console.warn('driveSyncUp: file not found on Drive, recreating...');
      DB.driveFileId = null;
      const newMeta = { name: GDRIVE_FILENAME, parents: ['appDataFolder'] };
      const newForm = new FormData();
      newForm.append('metadata', new Blob([JSON.stringify(newMeta)], { type: 'application/json' }));
      newForm.append('file', new Blob([data], { type: 'application/json' }));
      r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        { method: 'POST', headers: { Authorization: 'Bearer ' + DB.driveToken }, body: newForm });
    }
    if (!r.ok) {
      const errText = await r.text();
      console.error('driveSyncUp error:', r.status, errText);
      throw new Error('API Drive ' + r.status + ' — ' + errText.slice(0,100));
    }
    const j = await r.json();
    DB.driveFileId = j.id;
    showToast(t('drive_saved'));
  } catch(e) {
    console.error('driveSyncUp error:', e);
    showToast('Drive: ' + (e.message||JSON.stringify(e)).slice(0,80), 'error');
  }
  finally { setSync(false); }
}

async function driveSyncDown() {
  if (!await ensureValidToken()) { showToast(t('drive_not_connected'),'error'); return; }
  setSync(true);
  try {
    const search = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${GDRIVE_FILENAME}'&fields=files(id)`,
      { headers: { Authorization: 'Bearer ' + DB.driveToken } }
    );
    if (!search.ok) {
      const errText = await search.text();
      console.error('driveSyncDown search error:', search.status, errText);
      throw new Error('API Drive ' + search.status + ' — ' + errText.slice(0,100));
    }
    const sj = await search.json();
    if (!sj.files || !sj.files.length) { showToast(t('drive_no_backup_found')); setSync(false); return; }
    DB.driveFileId = sj.files[0].id;
    const dl = await fetch(
      `https://www.googleapis.com/drive/v3/files/${DB.driveFileId}?alt=media`,
      { headers: { Authorization: 'Bearer ' + DB.driveToken } }
    );
    const d = await dl.json();
    if (d.measures) DB.measures = d.measures;
    if (d.bestDEP) DB.bestDEP = d.bestDEP;
    if (d.reminders) DB.reminders = d.reminders;
    showToast(t('drive_restored'));
    renderDashboard();
  } catch(e) { showToast('Erreur restauration Drive', 'error'); }
  finally { setSync(false); }
}

// Debounced: rapid saves/deletes collapse into a single Drive upload after 2 s
let _autoSyncTimer = null;
function driveAutoSync() {
  if (!DB.driveToken) return;
  clearTimeout(_autoSyncTimer);
  _autoSyncTimer = setTimeout(() => driveSyncUp(), 2000);
}

  document.getElementById('statusDot').className = 'status-dot' + (on ? ' syncing' : '');

async function exportJSON() {
  const payload = { measures: DB.measures, bestDEP: DB.bestDEP, reminders: DB.reminders, version: 2 };
  const jsonStr = JSON.stringify(payload, null, 2);
  const filename = 'asthmetrack_backup_' + new Date().toISOString().slice(0,10) + '.json';

  if (IS_CAPACITOR) {
    // Native: write to Documents via @capacitor/filesystem then share
    try {
      const Filesystem = window.Capacitor?.Plugins?.Filesystem;
      const Share      = window.Capacitor?.Plugins?.Share;
      if (!Filesystem) throw new Error('Plugin Filesystem unavailable — run npx cap sync');
      // btoa requires a binary string; use encodeURIComponent round-trip for full UTF-8
      const b64 = btoa(unescape(encodeURIComponent(jsonStr)));
      await Filesystem.writeFile({ path: filename, data: b64, directory: 'DOCUMENTS', recursive: true });
      showToast(t('toast_json_exported'));
      if (Share) {
        const uriResult = await Filesystem.getUri({ path: filename, directory: 'DOCUMENTS' });
        await Share.share({ title: filename, url: uriResult.uri, dialogTitle: filename });
      }
    } catch (fsErr) {
      console.error('JSON export error:', fsErr);
      showToast(t('pdf_save_error', (fsErr.message || '').slice(0, 60)), 'error');
    }
  } else {
    // Web: standard Blob download
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 2000);
    showToast(t('toast_json_exported'));
  }
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      // Basic schema validation
      if (!Array.isArray(data.measures)) throw new Error(t('toast_json_invalid'));
      const existing = DB.measures.length;
      if (existing > 0) {
        if (!confirm(t('import_confirm', data.measures.length, existing))) return;
      }
      if (data.measures)  DB.measures = data.measures;
      if (data.bestDEP)   DB.bestDEP  = data.bestDEP;
      if (data.reminders) DB.reminders = data.reminders;
      renderDashboard();
      showToast(t('toast_json_imported', data.measures.length));
      driveAutoSync();
    } catch(err) {
      showToast(t('toast_json_import_err', (err.message||t('toast_json_invalid')).slice(0,60)), 'error');
    }
  };
  input.click();
}

  const list=document.getElementById('reminderList');if(!list)return;
  const rem=DB.reminders;
  if(!rem.length){list.innerHTML=`<p style="color:var(--muted);font-size:14px;margin-bottom:10px">${t('reminders_empty')}</p>`;return;}
  list.innerHTML=rem.map((r,i)=>`<div class="reminder-item"><div class="reminder-info"><div class="reminder-time">${r.time}</div><div class="reminder-label-text">${r.label}</div></div><label class="toggle"><input type="checkbox" ${r.active?'checked':''} onchange="toggleReminder(${i})"/><span class="toggle-slider"></span></label><button class="reminder-del" onclick="deleteReminder(${i})">✕</button></div>`).join('');
}
function addReminder(){
  const time=document.getElementById('reminderTime').value,label=document.getElementById('reminderLabel').value.trim()||t('reminder_ph_label');
  if(!time){showToast(t('toast_reminder_no_time'),'error');return;}
  const rem=DB.reminders;rem.push({time,label,active:true});DB.reminders=rem;
  scheduleReminders();renderReminderList();showToast(t('toast_reminder_added'));
}
function toggleReminder(i){const rem=DB.reminders;rem[i].active=!rem[i].active;DB.reminders=rem;scheduleReminders();renderReminderList();if(currentPage==='dashboard')renderDashboard();}
function deleteReminder(i){const rem=DB.reminders;rem.splice(i,1);DB.reminders=rem;scheduleReminders();renderReminderList();}
function scheduleReminders(){
  reminderTimers.forEach(t=>clearTimeout(t));reminderTimers=[];
  const now=new Date();
  DB.reminders.filter(r=>r.active).forEach(r=>{
    const[h,m]=r.time.split(':').map(Number),target=new Date(now);
    target.setHours(h,m,0,0);if(target<=now)target.setDate(target.getDate()+1);
    const t=setTimeout(async()=>{
      try {
        // Sur Android Capacitor : utilise le plugin Local Notifications
        if(IS_CAPACITOR && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications){
          const LN = window.Capacitor.Plugins.LocalNotifications;
          await LN.schedule({notifications:[{
            title:'AsthmeTrack 💊',
            body: r.label+' — Penser à votre Easyhaler !',
            id: Math.floor(Math.random()*100000),
            schedule:{ at: new Date(Date.now()+100) }
          }]});
        } else if(typeof Notification !== 'undefined' && Notification.permission==='granted'){
          // Fallback web
          new Notification('AsthmeTrack 💊',{body:r.label+' — Penser à votre Easyhaler !'});
        }
      } catch(e){ console.warn('Notification error:', e); }
      scheduleReminders();
    },target-now);
    reminderTimers.push(t);
  });
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
// Capture toutes les erreurs JS pour debug
window.onerror = function(msg, src, line, col, err) {
  showToast('JS Error: ' + msg, 'error');
  console.error('GLOBAL ERROR:', msg, src, line, col, err);
};
window.addEventListener('unhandledrejection', function(e) {
  showToast('Promise Error: ' + e.reason, 'error');
  console.error('UNHANDLED PROMISE:', e.reason);
});

document.addEventListener('DOMContentLoaded', async ()=>{
  await SecureStore.init(); // restore token from secure storage before first render
  // Apply persisted theme & language immediately
  applyTheme(isDark());
  document.documentElement.lang = _lang;
  renderStaticHTML();
  renderDashboard();
  // Demande la permission de notifications au démarrage
  if (!IS_CAPACITOR && typeof Notification !== 'undefined' && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  if (IS_CAPACITOR && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
    window.Capacitor.Plugins.LocalNotifications.requestPermissions().catch(function(){});
  }
  scheduleReminders(); // Les rappels utilisent le plugin natif
  const el=document.getElementById('inputDatetime');
  if(el){const now=new Date();now.setSeconds(0,0);el.value=now.toISOString().slice(0,16);}
});
</script>
