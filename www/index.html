<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsthmeTrack — Suivi intelligent de vos mesures respiratoires</title>
  <!-- Google Fonts: Same as app -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="app/app.css"/>
  <style>
    /* Define Landing Page specific overrides if needed,
       but ensure the base variables from app.css are available */
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e222d;
      --border: #2a2f3d;
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #4f9cf9;
      --accent2: #7c3aed;
      --green: #10d9a0;
      --header-bg: rgba(13,15,20,0.9);
      --font-head: 'Syne', sans-serif;
      --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-head); overflow-x: hidden; margin: 0; }

    .nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: var(--header-bg); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
    .logo { font-size: 24px; font-weight: 800; color: var(--accent); }
    .nav-btns { display: flex; gap: 10px; }

    .hero { padding: 80px 20px; text-align: center; }
    .hero h1 { font-size: 48px; margin-bottom: 20px; background: linear-gradient(135deg, var(--accent), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { font-size: 18px; color: var(--muted); max-width: 600px; margin: 0 auto 30px; }

    .demo-section { padding: 60px 20px; max-width: 800px; margin: 0 auto; }
    .card { background: var(--surface); padding: 24px; border-radius: var(--radius); }

    .btn-primary { display: inline-block; padding: 16px 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 12px; color: #fff; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="logo">AsthmeTrack</div>
  <div class="nav-btns">
    <a href="app/app.html?demo=true" style="color:var(--text); text-decoration:none; margin-right:1rem; padding: 10px;">Démo</a>
    <a href="app/app.html" class="btn-primary">Lancer l'App</a>
  </div>
</nav>

<section class="hero">
  <h1>Prenez le contrôle de votre asthme</h1>
  <p>Suivez votre DEP, votre SpO₂ et vos prises de traitement en toute simplicité. Sauvegardez vos données en toute confidentialité sur votre Google Drive.</p>
  <div style="display: flex; gap: 15px; justify-content: center;">
    <a href="app/app.html" class="btn-primary">Commencer le suivi</a>
    <a href="app/app.html?demo=true" style="display:inline-block; padding: 16px 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-weight: 700; text-decoration: none;">Voir une démo</a>
  </div>
</section>

</body>
</html>
